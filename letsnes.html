    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
            
            <div class="lg:col-span-5 text-center lg:text-left space-y-6">
                <img style="width: 30%; margin: auto;" src="./games/letsnes/images/icon-512.png" alt="">
                <h1 class="text-4xl sm:text-5xl font-extrabold text-white leading-tight">
                    Let's NES </br>
                    <span class="text-indigo-400 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">An online multiplayer NES emulator</span>
                </h1>
                <h2>
                </h2>
                <p class="text-slate-400 text-lg max-w-md mx-auto lg:mx-0">
                    NES/SFC Emulator, Online Room, Voice Chat, Play Together!
                </p>

                <div id="download" class="flex flex-col sm:flex-row lg:flex-col items-center justify-center lg:justify-start gap-4 pt-4">
                    <div class="flex flex-col sm:flex-row gap-4 w-full justify-center lg:justify-start">
                        <a href="https://apps.apple.com/us/app/lets-nes/id6774059992" class="w-60 hover:bg-[#1322be] text-white flex items-center px-4 py-2.5 rounded-xl transition-all shadow-lg shadow-red-500/10 transform hover:-translate-y-0.5">
                            <i class="fab fa-apple text-2xl mr-3 text-white"></i>
                            <div class="text-left">
                                <p class="text-[10px] uppercase text-slate-400 tracking-wider font-medium leading-none">Download on the</p>
                                <p class="text-base font-semibold font-sans mt-0.5 leading-none">App Store</p>
                            </div>
                        </a>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-4 w-full justify-center lg:justify-start">
                        <a href="https://play.google.com/store/apps/details?id=com.iyodoo.letsnes" class="w-60 hover:bg-[#13b54f] text-white flex items-center px-4 py-2.5 rounded-xl transition-all shadow-lg shadow-red-500/10 transform hover:-translate-y-0.5">
                            <i class="fab fa-google-play text-xl mr-3 text-slate-200"></i>
                            <div class="text-left">
                                <p class="text-[10px] uppercase text-slate-400 tracking-wider font-medium leading-none">GET IT ON</p>
                                <p class="text-base font-semibold font-sans mt-0.5 leading-none">Google Play</p>
                            </div>
                        </a>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-4 w-full justify-center lg:justify-start">
                        <a href="https://iyodoo.itch.io/lets-nes" class="w-60 hover:bg-[#ff3333] text-white flex items-center px-4 py-2.5 rounded-xl transition-all shadow-lg shadow-red-500/10 transform hover:-translate-y-0.5">
                            <i class="fab fa-itch-io text-xl mr-3 text-white"></i>
                            <div class="text-left">
                                <p class="text-[10px] uppercase text-red-100 tracking-wider font-medium leading-none">Play on</p>
                                <p class="text-base font-semibold font-sans mt-0.5 leading-none">itch.io</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7 flex justify-center relative">
                <div class="absolute -inset-4 bg-indigo-500/10 rounded-3xl blur-3xl -z-10 w-3/4 h-3/4 mx-auto my-auto"></div>
                <div class="absolute -inset-4 bg-purple-500/10 rounded-3xl blur-3xl -z-10 w-1/2 h-1/2 mx-auto my-auto animate-pulse"></div>
                
                <div class="banner w-full max-w-2xl from-slate-950 via-[#131926] to-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-800/80 overflow-hidden flex justify-center items-center aspect-[16/10]">
